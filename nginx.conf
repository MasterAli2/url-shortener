events {}

http {
    include /etc/nginx/mime.types;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;  # trust tunnel (safe for cloudflared)

    # One global rate limit per IP
    limit_req_zone $remote_addr zone=global:10m rate=10r/s;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;

        # Apply globally to everything in this server
        limit_req zone=global;

        location /static/ {
            alias /static/;
        }

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name ~^go\.;

        # Same global limit here
        limit_req zone=global;

        location / {
            rewrite ^/(.*)$ /r/$1 break;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}