<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>    
        window.onload = function(){
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-bs-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
        }
    </script>

</head>
<body>
    <header class="p-3 border-bottom">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between">
                <a href="/" class="text-decoration-none text-reset">
                    <span class="fs-4 fw-bold">{{ APP_NAME }}</span>
                </a>

                <div class="d-flex gap-2">
                    {% if request.user.is_staff%}
                        <a href="{% url 'admin:index' %}" class="btn btn-secondary">Admin Panel</a>
                    {% endif %}

                    {% if request.user.is_authenticated %}
                        <a href="{% url 'dashboard' %}" class="btn btn-primary">Dashboard</a>
                    {% else %}
                        <a href="{% url 'login' %}?next={% url 'dashboard' %}" class="btn btn-primary">Login</a>
                    {% endif %}
                    <!--<a href="{% url 'social:begin' 'discord' %}" class="btn btn-primary">Login with Discord</a>-->
                </div>
            </div>
        </div>
        <section class="py-5 text-center" style="margin-top: 50px;"></section>
        <section class="py-5 text-center">
            <div class="container">
                <h1 class="display-4 fw-bold">{{ APP_NAME }}</h1>
                <p class="lead text-muted col-md-8 mx-auto">
                    Idk what to put here
                </p>
                <div class="d-flex gap-2 justify-content-center mt-4">
                    <a href="about:blank" t="_self" class="btn btn-primary btn-lg">Fish?</a>
                    <a href="{% url 'github' %}" class="btn btn-outline-secondary btn-lg">Github</a>
                </div>
            </div>
        </section>
    </header>

    <button onclick="toggleTheme()" class="btn btn-sm border-5 shadow-none bg-transparent" id="themeBtn" style="position: absolute; top: 95%; right: 1rem;">🌙</button>

</body>
</html>
