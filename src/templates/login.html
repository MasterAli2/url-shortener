<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login — {{ APP_NAME }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>    
        window.onload = function(){
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-bs-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
        }
    </script>
</head>
<body class=" d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div style="width: 100%; max-width: 400px;" class="px-3">

        <a href="/" class="text-decoration-none text-muted small d-block mb-3">← Back</a>

        <h2 class="mb-4">Login</h2>

        <div class="card mb-3">
            <div class="card-header">Username & Password</div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger py-2 small">Invalid username or password.</div>
                    {% endif %}
                    {% for message in messages %}
                        <div class="alert alert-danger py-2 small">{{ message }}</div>
                    {% endfor %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Discord</div>
            <div class="card-body">
                <a href="{% url 'social:begin' 'discord' %}" class="btn btn-outline-primary w-100">
                    Login with Discord
                </a>
            </div>
        </div>

    </div>
    <button onclick="toggleTheme()" class="btn btn-sm border-5 shadow-none bg-transparent" id="themeBtn" style="position: absolute; top: 95%; right: 1rem;">🌙</button>

</body>
</html>
