<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   

    <script>
        window.onload = function(){
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-bs-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
        }
    </script>
</head>
<body>
    <div class="d-flex flex-column p-3 border-end" style="width: 250px; position: fixed; height: 100vh;">
        <a href='/' class="fs-4 fw-bold mb-4 text-decoration-none text-reset">{{ APP_NAME }}</a>
        <a href="/dashboard/" class="nav-link py-2 fs-5">Dashboard</a>
        <a href="/account/" class="nav-link py-2 fs-5">Account</a>

        <div class="mt-auto">
            {% if request.user.is_staff%}
                <a href="{% url 'admin:index' %}" class="nav-link text-muted small">Admin Panel</a>
            {% endif %}
            <a href="{% url 'github' %}" class="nav-link text-muted small">Source</a>
            <!--
            <a href="#" class="nav-link text-muted small">Terms of Service</a>
            <a href="#" class="nav-link text-muted small">Privacy Policy</a>
            -->
        </div>
    </div>

    <div style="margin-left: 250px; padding: 2rem; position: relative;">
        <button onclick="toggleTheme()" class="btn btn-sm border-5 shadow-none bg-transparent" id="themeBtn" style="position: absolute; top: 1rem; right: 1rem;">🌙</button>
        {% block content %}{% endblock %}
    </div>
    


</body>
</html>
